<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Seviyor Musun?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fff5f8 0%, #ffe5f0 50%, #ffd6e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 192, 203, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            transition: opacity 0.5s ease;
        }

        .container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #ff3b7f;
            margin-bottom: 50px;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(255, 59, 127, 0.15);
            letter-spacing: -0.5px;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
        }

        button {
            padding: 18px 45px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            font-family: inherit;
            backdrop-filter: blur(10px);
            letter-spacing: 0.3px;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            transform: scale(1);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #yesBtn:hover {
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
        }

        #yesBtn.fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            transform: none !important;
            border-radius: 0 !important;
            font-size: clamp(2rem, 5vw, 4rem) !important;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1) !important;
            padding: 0 !important;
        }

        #noBtn {
            background: linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%);
            color: white;
        }

        #noBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }

        #noBtn.moving {
            position: fixed;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 5vw, 4rem);
            color: #d63384;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 1001;
            text-shadow: 0 4px 20px rgba(214, 51, 132, 0.3);
            text-align: center;
            padding: 0 20px;
        }

        .message.show {
            opacity: 1;
        }

        .heart {
            position: fixed;
            font-size: 30px;
            animation: float 3s ease-in-out;
            pointer-events: none;
            z-index: 1002;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            button {
                padding: 14px 30px;
                font-size: 16px;
            }
            
            .button-container {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>Beni seviyor musun?</h1>
        <div class="button-container">
            <button id="yesBtn">Evet</button>
            <button id="noBtn">Hayır</button>
        </div>
    </div>
    <div class="message" id="message">Ben de seni seviyorum ❤️</div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const container = document.getElementById('container');
        const message = document.getElementById('message');
        
        let noClickCount = 0;
        let yesScale = 1;
        
        const noTexts = [
            'Hayır',
            'Emin misin?',
            'Gerçekten mi?',
            'Tekrar düşün 🤔',
            'Lütfen ya 🥺',
            'Yapma…',
            'Beni üzüyorsun…',
            'Gerçekten mi hayır? 💔',
            'Son şansın bu 😢',
            'Kalbimi kırıyorsun…',
            'Tamam, anladım… 😔',
            'Hadi \'Evet\'e bas :)'
        ];
        
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            noClickCount++;
            
            const textIndex = Math.min(noClickCount, noTexts.length - 1);
            noBtn.textContent = noTexts[textIndex];
            
            // Hayır butonunu rastgele bir yere taşı
            if (noClickCount < noTexts.length) {
                moveNoButton();
            }
            
            // Son tıklamadan önce (11. tıklama) Evet butonu ekranı kaplasın
            if (noClickCount >= 11) {
                yesBtn.style.transform = 'none';
                setTimeout(() => {
                    yesBtn.classList.add('fullscreen');
                }, 100);
            } else {
                // Her tıklamada Evet butonu büyüyor - daha hızlı büyüme
                yesScale += 0.35;
                yesBtn.style.transform = `scale(${yesScale})`;
            }
        });
        
        function moveNoButton() {
            const container = document.getElementById('container');
            const containerRect = container.getBoundingClientRect();
            
            // Viewport boyutları
            const maxX = window.innerWidth - noBtn.offsetWidth - 40;
            const maxY = window.innerHeight - noBtn.offsetHeight - 40;
            
            // Rastgele pozisyon
            const newX = Math.random() * maxX + 20;
            const newY = Math.random() * maxY + 20;
            
            noBtn.classList.add('moving');
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }
        
        yesBtn.addEventListener('click', function() {
            container.classList.add('hidden');
            message.classList.add('show');
            
            createHearts();
        });
        
        function createHearts() {
            const heartCount = 30;
            
            for (let i = 0; i < heartCount; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.textContent = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    
                    document.body.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.remove();
                    }, 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
